# Path-based PR labels. Schema: actions/labeler@v5.
# https://github.com/actions/labeler#configuration
web:
  - changed-files:
      - any-glob-to-any-file: 'apps/web/**'

api:
  - changed-files:
      - any-glob-to-any-file: 'apps/api/**'

extension:
  - changed-files:
      - any-glob-to-any-file: 'apps/extension/**'

docs:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - '**/*.md'

ci:
  - changed-files:
      - any-glob-to-any-file: '.github/**'

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - '**/package.json'
          - 'pnpm-lock.yaml'
          - 'pnpm-workspace.yaml'
